<body>
    <h1>Analizador de 3 números</h1>
    <p>Haz clic en el botón para introducir los números y ver los resultados.</p>

    <button onclick="iniciarPrograma()">Comenzar</button><br><br>

    <button onclick="window.location.href='../index.html'" class="home">Volver a la página principal</button>

    <script>
        function iniciarPrograma() {
            // 1. Pedir los 3 números al usuario
            let num1 = Number(prompt("Introduce el primer número:"));
            let num2 = Number(prompt("Introduce el segundo número:"));
            let num3 = Number(prompt("Introduce el tercer número:"));

            // 2. Sacar el mayor y el menor
            let mayor = Math.max(num1, num2, num3);
            let menor = Math.min(num1, num2, num3);

            // 3. Ordenar los números de mayor a menor
            let numeros = [num1, num2, num3];
            numeros.sort(function(a, b) { 
                return b - a; 
            });

            // 4. Mostrar el resultado final en una alerta
            alert("El número mayor es: " + mayor + 
                "\nEl número menor es: " + menor + 
                "\nLos números ordenados son: " + numeros);
        }
    </script>
