<body>
    <h1>Formulario de Registro</h1>
    <form action="#" method="post" id="contacto">
        <h2>Información Personal</h2>

        <label for="ID" class="id">ID</label>
        <input type="text" id="ID" name="ID" placeholder="1"><br><br>

        <label for="nombre">Nombre</label>
        <input type="text" id="nombre" name="nombre" placeholder="Tu Nombre" required><br><br>

        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="tuemail@ejemplo.com" required><br><br>
        
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" required><br><br>

        <label for="gender">Género</label><br>
        <div class="gender-options">
            <label><input type="radio" name="gender" value="male"> Masculino</label>
            <label><input type="radio" name="gender" value="female"> Femenino</label>
            <label><input type="radio" name="gender" value="other"> Otro</label>
            <label><input type="radio" name="gender" value="prefer_not_say"> Prefiero no decirlo</label><br><br>
        </div>

        <label for="edad">Edad</label>
        <input type="number" id="edad" name="edad" min="18" max="100" required><br><br>

        <h2>Otros Datos de Interés</h2>

        <label for="intereses" >Intereses</label><br>
        <div class="interests-options">
            <label><input type="checkbox" name="intereses" value="deportes"> Deportes</label>
            <label><input type="checkbox" name="intereses" value="musica"> Música</label>
            <label><input type="checkbox" name="intereses" value="tecnologia"> Tecnología</label>
            <label><input type="checkbox" name="intereses" value="arte"> Arte</label><br><br>
            <label><input type="checkbox" name="intereses" value="cine"> Cine</label>
            <label><input type="checkbox" name="intereses" value="literatura"> Literatura</label>
        </div>

        <label for="color" >Color Favorito</label>
        <input type="color" id="color" name="color"><br><br>

        <label for="phone_number" >Número de Teléfono</label>
        <input type="tel" id="phone_number" name="phone_number" placeholder="+34 123-456-789"  required pattern="[0-9]{9}" maxlength="15"><br><br>
        
        <label for="birthdate">Fecha de Nacimiento</label>
        <input type="date" id="birthdate" name="birthdate"><br><br>

        <label for="bio">Biografía Corta</label>
        <textarea id="bio" name="bio" rows="4" cols="50" placeholder="Escribe algo sobre ti..."></textarea><br><br>
    <label for="terms">
        <input type="checkbox" id="terms" name="terms" required> Acepto los términos y condiciones
    </label><br><br> 
    <input type="submit" value="Enviar" class="button">
    <input type="reset" value="Borrar" class="button">
    <button onclick="window.alert('Buenos días')" type="button" class="button">Saludo</button>
    <button onclick="document.write('Buenos días')" type="button" class="button">Saludo con write</button>
    <button onclick="console.log('Buenos días')" type="button" class="button">Saludo en Consola</button>
    </form><br>
    <script>
        const form = document.getElementById('contacto');
        form.addEventListener('submit', function(event) {
            event.preventDefault();

            const nombre = document.getElementById('nombre').value;
            const email = document.getElementById('email').value;
            alert('Nombre: ' + nombre + ' ' + 'Email: ' + email);

            
        });
    </script>
    <button onclick="window.location.href='../index.html'" class="home">Volver a la página principal</button>
</body>
